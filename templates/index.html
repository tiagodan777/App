{% extends 'layout.html' %}
{% block content %}

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f7f7f8;
    }

    #gridCanvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #f7f7f8;
        pointer-events: none;
    }
</style>

<canvas id="gridCanvas"></canvas>

<script>
(() => {
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');

    let width = 0;
    let height = 0;
    let dpr = 1;
    let points = [];
    let t = 0;
    let lastTime = 0;

    const config = {
        spacing: 19,
        overscan: 180,

        minDot: 0.55,
        maxDot: 5.8,

        movement: 19,
        speed: 1.55,

        background: '#f7f7f8',

        // Mete 0 se quiseres cinzento como nas imagens.
        // Mete 1 para amarelo/azul/roxo forte.
        colorStrength: 0.85
    };

    const grey = [155, 155, 155];

    const colors = [
        [255, 205, 65],   // amarelo
        [55, 135, 255],   // azul
        [170, 85, 255]    // roxo
    ];

    function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
    }

    function lerp(a, b, n) {
        return a + (b - a) * n;
    }

    function smoothstep(edge0, edge1, x) {
        const n = clamp((x - edge0) / (edge1 - edge0), 0, 1);
        return n * n * (3 - 2 * n);
    }

    function mixColor(a, b, n) {
        return [
            lerp(a[0], b[0], n),
            lerp(a[1], b[1], n),
            lerp(a[2], b[2], n)
        ];
    }

    function palette(n) {
        n = ((n % 1) + 1) % 1;

        if (n < 1 / 3) {
            return mixColor(colors[0], colors[1], n * 3);
        }

        if (n < 2 / 3) {
            return mixColor(colors[1], colors[2], (n - 1 / 3) * 3);
        }

        return mixColor(colors[2], colors[0], (n - 2 / 3) * 3);
    }

    function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);

        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        createPoints();
    }

    function createPoints() {
        points = [];

        const spacing = config.spacing;
        const startX = -config.overscan;
        const startY = -config.overscan;

        const cols = Math.ceil((width + config.overscan * 2) / spacing) + 1;
        const rows = Math.ceil((height + config.overscan * 2) / spacing) + 1;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                points.push({
                    x: startX + col * spacing,
                    y: startY + row * spacing,
                    seed: Math.random() * Math.PI * 2
                });
            }
        }
    }

    function getField(x, y) {
        const maxSide = Math.max(width, height);
        const minSide = Math.min(width, height);

        /*
            Isto é o centro da "respiração" da malha.
            Não é uma bola. É só o centro matemático da superfície.
        */
        const cx = width * (0.5 + Math.sin(t * 0.32) * 0.13);
        const cy = height * (0.5 + Math.cos(t * 0.27) * 0.11);

        const dx = x - cx;
        const dy = y - cy;

        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);

        const ux = dx / (dist || 1);
        const uy = dy / (dist || 1);

        /*
            Raio geral da malha a expandir/retrair.
            Quanto maior este valor, mais o "balão" ocupa o ecrã.
        */
        const breathingRadius =
            maxSide * (0.62 + Math.sin(t * 1.15) * 0.085);

        /*
            Padrões misturados:
            - onda radial
            - onda diagonal
            - onda horizontal/vertical
            - variação angular
        */
        const radialWave =
            Math.sin((dist / breathingRadius) * Math.PI * 4.2 - t * 3.1);

        const diagonalWave =
            Math.sin(x * 0.010 + y * 0.013 - t * 2.25);

        const crossWave =
            Math.sin(x * 0.017 - t * 1.45 + Math.sin(y * 0.008 + t) * 1.8);

        const angularWave =
            Math.sin(angle * 3.0 + dist * 0.006 - t * 1.7);

        const membrane =
            radialWave * 0.48 +
            diagonalWave * 0.23 +
            crossWave * 0.18 +
            angularWave * 0.11;

        /*
            Envelope grande.
            Mantém a malha toda visível, mas cria aquela zona maior
            de pontos mais fortes, como nas imagens de inspiração.
        */
        const envelope = clamp(
            1 - dist / (breathingRadius * 1.25),
            0,
            1
        );

        const pattern = 0.5 + membrane * 0.5;

        const strength = clamp(
            0.10 + envelope * 0.62 + pattern * 0.32,
            0,
            1
        );

        /*
            Movimento tipo superfície elástica.
            Os pontos não fogem demasiado, para não abrir buracos.
        */
        const breath = Math.sin(t * 2.15 + dist * 0.012);
        const ripple = Math.sin(t * 2.8 - dist * 0.018 + angle * 2.0);

        const push =
            config.movement *
            strength *
            (breath * 0.65 + ripple * 0.35);

        const tangent = config.movement * 0.22 * strength * angularWave;

        const moveX = ux * push + -uy * tangent;
        const moveY = uy * push + ux * tangent;

        const colorIndex =
            0.5 +
            0.5 * Math.sin(
                x * 0.0045 +
                y * 0.0035 +
                t * 0.95 +
                membrane * 1.4
            );

        return {
            x: x + moveX,
            y: y + moveY,
            strength,
            pattern,
            colorIndex
        };
    }

    function draw(now) {
        const delta = Math.min((now - lastTime) / 1000 || 0.016, 0.04);
        lastTime = now;

        t += delta * config.speed;

        ctx.fillStyle = config.background;
        ctx.fillRect(0, 0, width, height);

        for (const p of points) {
            const field = getField(p.x, p.y);

            const localPulse =
                0.5 + 0.5 * Math.sin(t * 4.0 + p.seed + field.pattern * 2.0);

            const size =
                config.minDot +
                field.strength * config.maxDot +
                localPulse * field.strength * 0.8;

            const alpha =
                0.12 +
                field.strength * 0.78;

            let color = palette(field.colorIndex);

            color = mixColor(
                grey,
                color,
                config.colorStrength * (0.25 + field.strength * 0.75)
            );

            ctx.beginPath();
            ctx.arc(field.x, field.y, size, 0, Math.PI * 2);
            ctx.fillStyle =
                `rgba(${Math.round(color[0])}, ${Math.round(color[1])}, ${Math.round(color[2])}, ${alpha})`;
            ctx.fill();
        }

        requestAnimationFrame(draw);
    }

    window.addEventListener('resize', resize);

    resize();
    requestAnimationFrame(draw);
})();
</script>

{% endblock %}
