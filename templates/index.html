{% extends 'layout.html' %}
{% block content %}
<canvas id="gridCanvas" style="display: block; width: 100%; height: 100vh; margin: 0; padding: 0;"></canvas>
<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    
    function redimensionar() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', redimensionar);
    redimensionar();

    let time = 0;
    const spacing = 30; // Distância base entre os pontos
    const baseDotRadius = 1.5; 
    
    // --- NOVAS VARIÁVEIS DE CONTROLO ---
    const waveAmplitude = 12; // Define o quão "alto" os pontos saltam fisicamente
    const speed = 0.05;       // Velocidade da animação (aumentei um pouco)

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for (let x = 0; x < canvas.width; x += spacing) {
            for (let y = 0; y < canvas.height; y += spacing) {
                
                // 1. Calculamos a onda pura (-1 a 1) para usar na física
                let rawWave = Math.sin((x * 0.015) + (y * 0.015) - time);
                
                // 2. Mapeamos a onda para 0 a 1 para o cálculo das cores
                let colorWave = rawWave * 0.5 + 0.5;
                
                // Transição de cores (Cinzento -> Azul -> Roxo)
                let r = Math.floor(150 - colorWave * 50);
                let g = Math.floor(150 - colorWave * 100);
                let b = Math.floor(150 + colorWave * 105);
                
                if (colorWave > 0.6) {
                    r = Math.floor(150 + (colorWave - 0.6) * 150); 
                }

                // --- A MAGIA DO MOVIMENTO FÍSICO ---
                // Deslocamento no eixo Y e X criando um efeito de ondulação 3D
                let offsetY = rawWave * waveAmplitude;
                let offsetX = Math.cos((x * 0.015) + (y * 0.015) - time) * (waveAmplitude / 2);
                
                // Opcional: fazer o ponto crescer/encolher ligeiramente ao ritmo da onda
                let currentRadius = baseDotRadius + (colorWave * 1.5);

                ctx.beginPath();
                // Em vez de 'x' e 'y' fixos, somamos o offset
                ctx.arc(x + offsetX, y + offsetY, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
                ctx.fill();
            }
        }
        time += speed; 
        requestAnimationFrame(draw);
    }
    draw();
</script>
{% endblock %}
