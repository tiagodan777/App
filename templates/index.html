{% extends 'layout.html' %}
{% block content %}

<style>
    html, body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: #f7f8fb;
    }

    #gridCanvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
    }
</style>

<canvas id="gridCanvas"></canvas>

<script>
(() => {
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');

    let width = 0;
    let height = 0;
    let dpr = 1;
    let time = 0;

    const spacing = 18;
    const amplitude = 18;     // quanto os pontos se mexem
    const speed = 0.018;      // velocidade geral
    const baseRadius = 1.1;
    const maxRadius = 3.7;

    function redimensionar() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);

        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', redimensionar);
    redimensionar();

    function misturarCor(c1, c2, t) {
        return [
            Math.round(c1[0] + (c2[0] - c1[0]) * t),
            Math.round(c1[1] + (c2[1] - c1[1]) * t),
            Math.round(c1[2] + (c2[2] - c1[2]) * t),
        ];
    }

    function corDoPonto(t) {
        const cinzento = [150, 154, 160];
        const azul = [70, 145, 255];
        const roxo = [175, 90, 255];

        if (t < 0.5) {
            return misturarCor(cinzento, azul, t / 0.5);
        }

        return misturarCor(azul, roxo, (t - 0.5) / 0.5);
    }

    function desenhar() {
        ctx.clearRect(0, 0, width, height);

        const centroX = width / 2;
        const centroY = height / 2;

        for (let x = -spacing; x < width + spacing; x += spacing) {
            for (let y = -spacing; y < height + spacing; y += spacing) {

                const nx = (x - centroX) / centroX;
                const ny = (y - centroY) / centroY;

                // Forma orgânica central, tipo malha do iCloud
                const distancia = Math.sqrt(
                    Math.pow(nx * 0.9, 2) +
                    Math.pow(ny * 1.15, 2)
                );

                let mascara = 1 - distancia;
                mascara = Math.max(0, Math.min(1, mascara));
                mascara = Math.pow(mascara, 1.7);

                if (mascara <= 0.02) continue;

                // Ondas diferentes para dar movimento real
                const wave1 = Math.sin(x * 0.018 + y * 0.010 + time);
                const wave2 = Math.cos(x * 0.010 - y * 0.020 - time * 1.25);
                const wave3 = Math.sin((x + y) * 0.012 - time * 0.8);

                const wave = (wave1 + wave2 + wave3) / 3;

                // Movimento dos pontos
                const px = x + Math.sin(y * 0.025 + time * 1.6) * amplitude * mascara;
                const py = y + Math.cos(x * 0.022 - time * 1.4) * amplitude * mascara;

                // Tamanho também anima
                const energia = (wave + 1) / 2;
                const radius = baseRadius + energia * maxRadius * mascara;

                // Gradiente horizontal + pequena animação na cor
                const colorT = Math.max(0, Math.min(1, (x / width) + Math.sin(time * 0.35) * 0.08));
                const [r, g, b] = corDoPonto(colorT);

                const alpha = 0.15 + mascara * 0.75;

                ctx.beginPath();
                ctx.arc(px, py, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
                ctx.fill();
            }
        }

        time += speed;
        requestAnimationFrame(desenhar);
    }

    desenhar();
})();
</script>

{% endblock %}
