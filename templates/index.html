{% extends 'layout.html' %}

{% block content %}

<div id="mapa-container">
    <canvas id="gridCanvas"></canvas>
</div>

<div
    id="estado-ligacao"
    data-status="connecting"
    aria-live="polite"
>
    A ligar…
</div>

<button
    type="button"
    id="ativar-notificacoes"
>
    Ativar notificações
</button>

<div
    class="mini-menu"
    data-destinatario-id=""
>
    <header>
        <img
            src="{{ doc_root }}imagens/fotos-perfil/default.webp"
            alt=""
        >

        <h1></h1>
    </header>

    <button
        type="button"
        class="ola"
        id="enviar-hey"
    >
        Hey
    </button>

    <form
        action=""
        method="post"
    >
        <input
            type="text"
            name="mensagem"
            id="mensagem"
            autocomplete="off"
        >

        <input
            type="submit"
            value="Enviar"
        >
    </form>
</div>

{% endblock %}

{% block scripts %}

<script>
    window.membroId = {{ membro_id|json_encode|raw }};

    window.messagesUrl =
        {{ (doc_root ~ 'messages')|json_encode|raw }};

    window.webSocketUrl =
        (
            window.location.protocol === 'https:'
                ? 'wss://'
                : 'ws://'
        ) +
        window.location.hostname +
        ':8080';
</script>
<div id="debug-viewport" style="position:fixed;bottom:70px;left:0;right:0;z-index:99999;background:#000;color:#0f0;font-size:11px;padding:6px;text-align:center;">
    a carregar...
</div>
<script>
    (function () {
        function atualizar() {
            var d = document.getElementById('debug-viewport');
            var vv = window.visualViewport;
            d.textContent =
                'standalone=' + (window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches) +
                ' | innerH=' + window.innerHeight +
                ' | clientH=' + document.documentElement.clientHeight +
                ' | vvH=' + (vv ? Math.round(vv.height) : 'n/a') +
                ' | screenH=' + window.screen.height +
                ' | availH=' + window.screen.availHeight +
                ' | appH-css=' + getComputedStyle(document.documentElement).getPropertyValue('--app-height') +
                ' | canvasH=' + (document.getElementById('gridCanvas') ? document.getElementById('gridCanvas').style.height : 'n/a');
        }
        atualizar();
        setInterval(atualizar, 500);
    })();
</script>
<script src="{{ doc_root }}js/index-posicao.js?v=100"></script>
<script src="{{ doc_root }}js/websocket.js?v=100"></script>
<script src="{{ doc_root }}js/index-mini-menu.js?v=100"></script>
<script src="{{ doc_root }}js/index-animacao.js?v=100"></script>
<script src="{{ doc_root }}js/index-tap-foto.js?v=100"></script>

{% endblock %}
