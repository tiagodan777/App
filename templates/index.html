{% extends 'layout.html' %}
{% block content %}

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f7f7f8;
    }

    #gridCanvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #f7f7f8;
    }
</style>

<canvas id="gridCanvas"></canvas>

<script>
(() => {
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');

    let width = 0;
    let height = 0;
    let dpr = 1;
    let points = [];
    let time = 0;

    const spacing = 24;

    const colors = {
        yellow: [255, 205, 65],
        blue:   [55, 135, 255],
        purple: [170, 85, 255]
    };

    const blobs = [
        {
            x: 0,
            y: 0,
            vx: 1.1,
            vy: 0.45,
            targetVx: 1.1,
            targetVy: 0.45,
            color: colors.yellow,
            nextTurn: 0,
            phase: Math.random() * Math.PI * 2
        },
        {
            x: 0,
            y: 0,
            vx: -0.75,
            vy: 0.95,
            targetVx: -0.75,
            targetVy: 0.95,
            color: colors.blue,
            nextTurn: 0,
            phase: Math.random() * Math.PI * 2
        },
        {
            x: 0,
            y: 0,
            vx: 0.7,
            vy: -1.0,
            targetVx: 0.7,
            targetVy: -1.0,
            color: colors.purple,
            nextTurn: 0,
            phase: Math.random() * Math.PI * 2
        }
    ];

    function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);

        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        blobs[0].x = width * 0.25;
        blobs[0].y = height * 0.35;

        blobs[1].x = width * 0.75;
        blobs[1].y = height * 0.45;

        blobs[2].x = width * 0.50;
        blobs[2].y = height * 0.75;

        createPoints();
    }

    function createPoints() {
        points = [];

        const cols = Math.ceil(width / spacing) + 4;
        const rows = Math.ceil(height / spacing) + 4;

        const startX = -spacing * 2;
        const startY = -spacing * 2;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                points.push({
                    x: startX + col * spacing,
                    y: startY + row * spacing,
                    seed: Math.random() * Math.PI * 2
                });
            }
        }
    }

    window.addEventListener('resize', resize);
    resize();

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
    }

    function chooseDirection(blob, now) {
        const speed = 1.35;

        const directions = [
            [ speed, 0 ],
            [ -speed, 0 ],
            [ 0, speed ],
            [ 0, -speed ],
            [ speed * 0.75, speed * 0.65 ],
            [ speed * 0.75, -speed * 0.65 ],
            [ -speed * 0.75, speed * 0.65 ],
            [ -speed * 0.75, -speed * 0.65 ],
            [ speed * 0.35, speed ],
            [ -speed * 0.35, speed ],
            [ speed * 0.35, -speed ],
            [ -speed * 0.35, -speed ]
        ];

        const dir = directions[Math.floor(Math.random() * directions.length)];

        blob.targetVx = dir[0];
        blob.targetVy = dir[1];

        // Muda mais rápido: entre 0.9s e 1.8s
        blob.nextTurn = now + 900 + Math.random() * 900;
    }

    function updateBlob(blob, now) {
        if (now > blob.nextTurn) {
            chooseDirection(blob, now);
        }

        // Mudança de direção mais rápida, mas ainda suave
        blob.vx = lerp(blob.vx, blob.targetVx, 0.055);
        blob.vy = lerp(blob.vy, blob.targetVy, 0.055);

        blob.x += blob.vx;
        blob.y += blob.vy;

        const margin = 80;

        if (blob.x < -margin) {
            blob.x = -margin;
            blob.targetVx = Math.abs(blob.targetVx);
        }

        if (blob.x > width + margin) {
            blob.x = width + margin;
            blob.targetVx = -Math.abs(blob.targetVx);
        }

        if (blob.y < -margin) {
            blob.y = -margin;
            blob.targetVy = Math.abs(blob.targetVy);
        }

        if (blob.y > height + margin) {
            blob.y = height + margin;
            blob.targetVy = -Math.abs(blob.targetVy);
        }
    }

    blobs.forEach(blob => chooseDirection(blob, performance.now()));

    function draw(now) {
        ctx.clearRect(0, 0, width, height);

        for (const blob of blobs) {
            updateBlob(blob, now);
        }

        for (const p of points) {
            let totalInfluence = 0;

            let r = 0;
            let g = 0;
            let b = 0;

            let pushX = 0;
            let pushY = 0;

            for (const blob of blobs) {
                const breath = 0.5 + 0.5 * Math.sin(time * 2.2 + blob.phase);

                // Blobs grandes para cobrir o ecrã todo
                const radiusX = Math.min(width, height) * (0.48 + breath * 0.16);
                const radiusY = Math.min(width, height) * (0.42 + breath * 0.14);

                const dx = (p.x - blob.x) / radiusX;
                const dy = (p.y - blob.y) / radiusY;

                const dist = Math.sqrt(dx * dx + dy * dy);

                let influence = 1 - dist;
                influence = clamp(influence, 0, 1);
                influence = Math.pow(influence, 1.7);

                if (influence > 0) {
                    totalInfluence += influence;

                    r += blob.color[0] * influence;
                    g += blob.color[1] * influence;
                    b += blob.color[2] * influence;

                    // Movimento tipo balão: expande/contrai à volta dos centros
                    const push = influence * (breath - 0.5) * 18;

                    pushX += dx * push;
                    pushY += dy * push;
                }
            }

            totalInfluence = clamp(totalInfluence, 0, 1.8);

            const normalizedInfluence = clamp(totalInfluence, 0, 1);

            let finalR;
            let finalG;
            let finalB;

            if (totalInfluence > 0.001) {
                finalR = r / totalInfluence;
                finalG = g / totalInfluence;
                finalB = b / totalInfluence;
            } else {
                finalR = 165;
                finalG = 165;
                finalB = 165;
            }

            // Pontos base continuam visíveis em todo o ecrã
            const baseGrey = 160;

            finalR = lerp(baseGrey, finalR, 0.30 + normalizedInfluence * 0.85);
            finalG = lerp(baseGrey, finalG, 0.30 + normalizedInfluence * 0.85);
            finalB = lerp(baseGrey, finalB, 0.30 + normalizedInfluence * 0.85);

            const localPulse = 0.5 + 0.5 * Math.sin(time * 3.2 + p.seed);

            const size =
                0.65 +
                normalizedInfluence * 4.8 +
                localPulse * normalizedInfluence * 1.4;

            const alpha =
                0.24 +
                normalizedInfluence * 0.72;

            const px = p.x + pushX;
            const py = p.y + pushY;

            ctx.beginPath();
            ctx.arc(px, py, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${Math.round(finalR)}, ${Math.round(finalG)}, ${Math.round(finalB)}, ${alpha})`;
            ctx.fill();
        }

        // Mais rápido a animar
        time += 0.026;

        requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
})();
</script>

{% endblock %}
