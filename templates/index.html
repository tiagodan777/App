{% extends 'layout.html' %}
{% block content %}

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
        overflow: hidden;
    }

    .mesh-wrapper {
        position: fixed;
        inset: 24px;
        border-radius: 70px;
        background: #f7f7f8;
        overflow: hidden;
    }

    #gridCanvas {
        width: 100%;
        height: 100%;
        display: block;
    }
</style>

<div class="mesh-wrapper">
    <canvas id="gridCanvas"></canvas>
</div>

<script>
(() => {
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');

    let width = 0;
    let height = 0;
    let dpr = 1;

    const spacing = 27;

    let points = [];

    let blob = {
        x: 0,
        y: 0,
        vx: 0.35,
        vy: 0.18,
        targetVx: 0.35,
        targetVy: 0.18,
        nextTurn: 0
    };

    let time = 0;

    function resize() {
        const rect = canvas.getBoundingClientRect();

        dpr = Math.min(window.devicePixelRatio || 1, 2);

        width = rect.width;
        height = rect.height;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        blob.x = width * 0.55;
        blob.y = height * 0.45;

        createPoints();
    }

    function createPoints() {
        points = [];

        const cols = Math.ceil(width / spacing) + 4;
        const rows = Math.ceil(height / spacing) + 4;

        const startX = -spacing * 2;
        const startY = -spacing * 2;

        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                points.push({
                    x: startX + x * spacing,
                    y: startY + y * spacing,
                    seed: Math.random() * Math.PI * 2
                });
            }
        }
    }

    window.addEventListener('resize', resize);
    resize();

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
    }

    function mix(c1, c2, t) {
        return [
            Math.round(lerp(c1[0], c2[0], t)),
            Math.round(lerp(c1[1], c2[1], t)),
            Math.round(lerp(c1[2], c2[2], t))
        ];
    }

    function colorGradient(t) {
        const grey = [145, 150, 155];
        const blue = [70, 145, 255];
        const purple = [174, 90, 255];

        t = clamp(t, 0, 1);

        if (t < 0.5) {
            return mix(grey, blue, t / 0.5);
        }

        return mix(blue, purple, (t - 0.5) / 0.5);
    }

    function chooseDirection(now) {
        const speed = 0.62;

        const directions = [
            [ speed, 0 ],
            [ -speed, 0 ],
            [ 0, speed ],
            [ 0, -speed ],
            [ speed * 0.75, speed * 0.45 ],
            [ speed * 0.75, -speed * 0.45 ],
            [ -speed * 0.75, speed * 0.45 ],
            [ -speed * 0.75, -speed * 0.45 ]
        ];

        const dir = directions[Math.floor(Math.random() * directions.length)];

        blob.targetVx = dir[0];
        blob.targetVy = dir[1];

        blob.nextTurn = now + 2600 + Math.random() * 2400;
    }

    chooseDirection(performance.now());

    function draw(now) {
        ctx.clearRect(0, 0, width, height);

        if (now > blob.nextTurn) {
            chooseDirection(now);
        }

        // Suaviza mudança de direção
        blob.vx = lerp(blob.vx, blob.targetVx, 0.025);
        blob.vy = lerp(blob.vy, blob.targetVy, 0.025);

        blob.x += blob.vx;
        blob.y += blob.vy;

        const margin = 140;

        if (blob.x < margin) {
            blob.x = margin;
            blob.targetVx = Math.abs(blob.targetVx);
        }

        if (blob.x > width - margin) {
            blob.x = width - margin;
            blob.targetVx = -Math.abs(blob.targetVx);
        }

        if (blob.y < margin) {
            blob.y = margin;
            blob.targetVy = Math.abs(blob.targetVy);
        }

        if (blob.y > height - margin) {
            blob.y = height - margin;
            blob.targetVy = -Math.abs(blob.targetVy);
        }

        // Respiração tipo balão
        const breath = 0.5 + 0.5 * Math.sin(time * 1.15);
        const blobScale = 0.88 + breath * 0.26;

        const radiusX = Math.min(width, height) * 0.42 * blobScale;
        const radiusY = Math.min(width, height) * 0.36 * blobScale;

        // Deslocação suave da cor
        const colorMotion = 0.5 + 0.5 * Math.sin(time * 0.55);

        for (const p of points) {
            const dx = (p.x - blob.x) / radiusX;
            const dy = (p.y - blob.y) / radiusY;

            const dist = Math.sqrt(dx * dx + dy * dy);

            // Influência da bolha: 1 no centro, 0 longe
            let influence = 1 - dist;
            influence = clamp(influence, 0, 1);
            influence = Math.pow(influence, 1.65);

            // Mesmo fora da bolha há pontos pequenos, como no exemplo
            const backgroundDot = 0.12;

            // Pontos crescem e diminuem, sem onda espacial
            const localPulse = 0.5 + 0.5 * Math.sin(time * 1.8 + p.seed);

            const size =
                0.55 +
                backgroundDot * 0.75 +
                influence * 5.2 +
                influence * localPulse * 1.2;

            const alpha =
                0.18 +
                influence * 0.72;

            // Pequeno "breathing" radial: parece balão, não onda
            const push = influence * (breath - 0.5) * 13;

            const px = p.x + dx * push;
            const py = p.y + dy * push;

            // Cor depende da posição + movimento global
            const colorT = clamp(
                (px / width) * 0.58 +
                influence * 0.30 +
                colorMotion * 0.18,
                0,
                1
            );

            const [r, g, b] = colorGradient(colorT);

            // Pontos muito longe ficam mais cinzentos e discretos
            const finalR = Math.round(lerp(150, r, influence + 0.18));
            const finalG = Math.round(lerp(150, g, influence + 0.18));
            const finalB = Math.round(lerp(150, b, influence + 0.18));

            ctx.beginPath();
            ctx.arc(px, py, size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${finalR}, ${finalG}, ${finalB}, ${alpha})`;
            ctx.fill();
        }

        time += 0.016;

        requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
})();
</script>

{% endblock %}
