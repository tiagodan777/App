{% extends 'layout.html' %}
{% block content %}

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f7f7f8;
    }

    #gridCanvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #f7f7f8;
    }
</style>

<canvas id="gridCanvas"></canvas>

<script>
(() => {
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');

    let width = 0;
    let height = 0;
    let dpr = 1;
    let points = [];
    let time = 0;

    const spacing = 18;

    const flow = {
        offsetX: 0,
        offsetY: 0,
        vx: 0.42,
        vy: 0.18,
        targetVx: 0.42,
        targetVy: 0.18,
        nextTurn: 0
    };

    // Controla pequenas variações aleatórias do padrão
    const pattern = {
        a: 2.3,
        b: 2.0,
        c: 1.7,
        d: 1.9,
        targetA: 2.3,
        targetB: 2.0,
        targetC: 1.7,
        targetD: 1.9,
        phase: Math.random() * Math.PI * 2,
        nextChange: 0
    };

    function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);

        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        createPoints();
    }

    function createPoints() {
        points = [];

        const cols = Math.ceil(width / spacing) + 4;
        const rows = Math.ceil(height / spacing) + 4;

        const startX = -spacing * 2;
        const startY = -spacing * 2;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                points.push({
                    x: startX + col * spacing,
                    y: startY + row * spacing,
                    seed: Math.random() * Math.PI * 2,
                    randomSize: 0.75 + Math.random() * 0.5
                });
            }
        }
    }

    window.addEventListener('resize', resize);
    resize();

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
    }

    function smoothstep(edge0, edge1, x) {
        const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
        return t * t * (3 - 2 * t);
    }

    function mixColor(c1, c2, t) {
        return [
            Math.round(lerp(c1[0], c2[0], t)),
            Math.round(lerp(c1[1], c2[1], t)),
            Math.round(lerp(c1[2], c2[2], t))
        ];
    }

    function getGradientColor(t) {
        const yellow = [255, 208, 70];
        const blue   = [70, 140, 255];
        const purple = [170, 85, 255];

        t = clamp(t, 0, 1);

        if (t < 0.5) {
            return mixColor(yellow, blue, t / 0.5);
        }

        return mixColor(blue, purple, (t - 0.5) / 0.5);
    }

    function chooseDirection(now) {
        const speed = 0.62;

        const directions = [
            [ speed, 0 ],
            [ -speed, 0 ],
            [ 0, speed ],
            [ 0, -speed ],
            [ speed * 0.75, speed * 0.45 ],
            [ speed * 0.75, -speed * 0.45 ],
            [ -speed * 0.75, speed * 0.45 ],
            [ -speed * 0.75, -speed * 0.45 ],
            [ speed * 0.35, speed * 0.9 ],
            [ -speed * 0.35, speed * 0.9 ],
            [ speed * 0.35, -speed * 0.9 ],
            [ -speed * 0.35, -speed * 0.9 ]
        ];

        const dir = directions[Math.floor(Math.random() * directions.length)];

        flow.targetVx = dir[0];
        flow.targetVy = dir[1];

        // um pouco mais lento a mudar direção
        flow.nextTurn = now + 1300 + Math.random() * 1700;
    }

    function choosePattern(now) {
        pattern.targetA = 1.8 + Math.random() * 1.8;
        pattern.targetB = 1.6 + Math.random() * 1.7;
        pattern.targetC = 1.3 + Math.random() * 1.8;
        pattern.targetD = 1.4 + Math.random() * 1.9;
        pattern.phase = Math.random() * Math.PI * 2;

        pattern.nextChange = now + 1600 + Math.random() * 2200;
    }

    chooseDirection(performance.now());
    choosePattern(performance.now());

    function updateFlow(now) {
        if (now >= flow.nextTurn) {
            chooseDirection(now);
        }

        if (now >= pattern.nextChange) {
            choosePattern(now);
        }

        // mudanças mais suaves
        flow.vx = lerp(flow.vx, flow.targetVx, 0.032);
        flow.vy = lerp(flow.vy, flow.targetVy, 0.032);

        flow.offsetX += flow.vx;
        flow.offsetY += flow.vy;

        // padrão muda suavemente para valores aleatórios
        pattern.a = lerp(pattern.a, pattern.targetA, 0.012);
        pattern.b = lerp(pattern.b, pattern.targetB, 0.012);
        pattern.c = lerp(pattern.c, pattern.targetC, 0.012);
        pattern.d = lerp(pattern.d, pattern.targetD, 0.012);
    }

    function field(nx, ny, t) {
        const a =
            Math.sin(nx * pattern.a + t * 0.78 + pattern.phase) +
            Math.cos(ny * pattern.b - t * 0.62);

        const b =
            Math.sin((nx + ny) * pattern.c - t * 0.54) +
            Math.cos((nx - ny) * pattern.d + t * 0.68);

        const c =
            Math.sin(nx * 3.1 - ny * 1.2 + t * 0.42) +
            Math.cos(ny * 2.8 + nx * 1.0 - t * 0.38);

        // camada extra para dar aleatoriedade orgânica
        const randomLayer =
            Math.sin(nx * 5.2 + ny * 2.7 + t * 0.34 + pattern.phase) * 0.22;

        return (a * 0.34) + (b * 0.38) + (c * 0.24) + randomLayer;
    }

    function draw(now) {
        ctx.clearRect(0, 0, width, height);

        updateFlow(now);

        // expansão / retração da superfície inteira
        const breath = 0.5 + 0.5 * Math.sin(time * 1.35);
        const zoom = 0.94 + breath * 0.18;

        const driftX = flow.offsetX * 0.0022;
        const driftY = flow.offsetY * 0.0022;

        for (const p of points) {
            const cx = width / 2;
            const cy = height / 2;

            let nx = (p.x - cx) / cx;
            let ny = (p.y - cy) / cy;

            nx /= zoom;
            ny /= zoom;

            nx += driftX;
            ny += driftY;

            // pequeno warp contínuo, mas mais aleatório e menos “onda”
            const warp1 = Math.sin(ny * 1.8 + time * 0.48 + p.seed * 0.15) * 0.075;
            const warp2 = Math.cos(nx * 1.7 - time * 0.52 + p.seed * 0.12) * 0.075;

            const sx = nx + warp1;
            const sy = ny + warp2;

            const v = field(sx, sy, time);

            const n = clamp((v + 2.1) / 4.2, 0, 1);
            const density = smoothstep(0.13, 0.92, n);

            const [r, g, b] = getGradientColor(n);

            const baseAlpha = 0.20;
            const alpha = baseAlpha + density * 0.70;

            const localPulse = 0.5 + 0.5 * Math.sin(time * 2.35 + p.seed + n * 3.0);

            const radius =
                0.75 +
                density * 3.8 * p.randomSize +
                localPulse * density * 1.0;

            const pushAmount = (density - 0.5) * 6.5 + (breath - 0.5) * 5.8;
            const angle = (n * Math.PI * 2.0) + p.seed * 0.22;

            const px = p.x + Math.cos(angle) * pushAmount * 0.42;
            const py = p.y + Math.sin(angle) * pushAmount * 0.42;

            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            ctx.fill();
        }

        // antes estava 0.028; agora está um pouco mais lento
        time += 0.021;

        requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
})();
</script>

{% endblock %}
