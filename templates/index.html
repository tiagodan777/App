{% extends 'layout.html' %}

{% block content %}

<canvas id="gridCanvas"></canvas>

<div
    id="estado-ligacao"
    data-status="connecting"
    aria-live="polite"
>
    A ligar…
</div>

<button
    type="button"
    id="ativar-notificacoes"
>
    Ativar notificações
</button>

<div
    class="mini-menu"
    data-destinatario-id=""
>
    <header>
        <img
            src="/imagens/fotos-perfil/default.webp"
            alt=""
        >

        <h1></h1>
    </header>

    <button
        type="button"
        class="ola"
        id="enviar-hey"
    >
        Hey
    </button>

    <form
        action=""
        method="post"
    >
        <input
            type="text"
            name="mensagem"
            id="mensagem"
            autocomplete="off"
        >

        <input
            type="submit"
            value="Enviar"
        >
    </form>
</div>

<script>
    window.membroId =
        {{ membro_id|json_encode|raw }};

    window.messagesUrl =
        {{ (doc_root ~ 'messages')|json_encode|raw }};

    window.webSocketUrl =
        'ws://' +
        window.location.hostname +
        ':8080';
</script>

<script src="{{ doc_root }}js/index-posicao.js?v=6"></script>
<script src="{{ doc_root }}js/websocket.js?v=6"></script>
<script src="{{ doc_root }}js/index-mini-menu.js?v=6"></script>
<script src="{{ doc_root }}js/index-animacao.js?v=6"></script>
<script src="{{ doc_root }}js/index-tap-foto.js?v=6"></script>

{% endblock %}
