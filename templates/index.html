{% extends 'layout.html' %}
{% block content %}

<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f7f7f8;
    }

    #gridCanvas {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #f7f7f8;
    }
</style>

<canvas id="gridCanvas"></canvas>

<script>
(() => {
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');

    let width = 0;
    let height = 0;
    let dpr = 1;
    let points = [];
    let time = 0;

    const spacing = 18;

    const flow = {
        offsetX: 0,
        offsetY: 0,
        vx: 0.55,
        vy: 0.22,
        targetVx: 0.55,
        targetVy: 0.22,
        nextTurn: 0
    };

    function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        width = window.innerWidth;
        height = window.innerHeight;

        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);

        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        createPoints();
    }

    function createPoints() {
        points = [];

        const cols = Math.ceil(width / spacing) + 4;
        const rows = Math.ceil(height / spacing) + 4;

        const startX = -spacing * 2;
        const startY = -spacing * 2;

        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                points.push({
                    x: startX + col * spacing,
                    y: startY + row * spacing,
                    seed: Math.random() * Math.PI * 2
                });
            }
        }
    }

    window.addEventListener('resize', resize);
    resize();

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
    }

    function smoothstep(edge0, edge1, x) {
        const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
        return t * t * (3 - 2 * t);
    }

    function mixColor(c1, c2, t) {
        return [
            Math.round(lerp(c1[0], c2[0], t)),
            Math.round(lerp(c1[1], c2[1], t)),
            Math.round(lerp(c1[2], c2[2], t))
        ];
    }

    function getGradientColor(t) {
        const yellow = [255, 208, 70];
        const blue   = [70, 140, 255];
        const purple = [170, 85, 255];

        t = clamp(t, 0, 1);

        if (t < 0.5) {
            return mixColor(yellow, blue, t / 0.5);
        }

        return mixColor(blue, purple, (t - 0.5) / 0.5);
    }

    function chooseDirection(now) {
        const speed = 0.85;

        const directions = [
            [ speed, 0 ],
            [ -speed, 0 ],
            [ 0, speed ],
            [ 0, -speed ],
            [ speed * 0.78, speed * 0.42 ],
            [ speed * 0.78, -speed * 0.42 ],
            [ -speed * 0.78, speed * 0.42 ],
            [ -speed * 0.78, -speed * 0.42 ],
            [ speed * 0.35, speed * 0.92 ],
            [ -speed * 0.35, speed * 0.92 ],
            [ speed * 0.35, -speed * 0.92 ],
            [ -speed * 0.35, -speed * 0.92 ]
        ];

        const dir = directions[Math.floor(Math.random() * directions.length)];
        flow.targetVx = dir[0];
        flow.targetVy = dir[1];

        // muda mais rápido
        flow.nextTurn = now + 900 + Math.random() * 1100;
    }

    chooseDirection(performance.now());

    function updateFlow(now) {
        if (now >= flow.nextTurn) {
            chooseDirection(now);
        }

        flow.vx = lerp(flow.vx, flow.targetVx, 0.045);
        flow.vy = lerp(flow.vy, flow.targetVy, 0.045);

        flow.offsetX += flow.vx;
        flow.offsetY += flow.vy;
    }

    // Campo contínuo que cobre o ecrã todo
    function field(nx, ny, t) {
        const a =
            Math.sin(nx * 2.3 + t * 0.95) +
            Math.cos(ny * 2.0 - t * 0.75);

        const b =
            Math.sin((nx + ny) * 1.7 - t * 0.65) +
            Math.cos((nx - ny) * 1.9 + t * 0.85);

        const c =
            Math.sin(nx * 3.6 - ny * 1.4 + t * 0.55) +
            Math.cos(ny * 3.2 + nx * 1.1 - t * 0.45);

        return (a * 0.34) + (b * 0.38) + (c * 0.28);
    }

    function draw(now) {
        ctx.clearRect(0, 0, width, height);

        updateFlow(now);

        // expansão / retração da superfície inteira
        const breath = 0.5 + 0.5 * Math.sin(time * 1.9);
        const zoom = 0.92 + breath * 0.24;

        // deslocação global da superfície
        const driftX = flow.offsetX * 0.0025;
        const driftY = flow.offsetY * 0.0025;

        for (const p of points) {
            const cx = width / 2;
            const cy = height / 2;

            // coordenadas normalizadas
            let nx = (p.x - cx) / cx;
            let ny = (p.y - cy) / cy;

            // expande/retrai a superfície toda
            nx /= zoom;
            ny /= zoom;

            // deslocação contínua na mesma direção
            nx += driftX;
            ny += driftY;

            // ligeiro warp para dar padrão orgânico contínuo
            const warp1 = Math.sin(ny * 2.2 + time * 0.7) * 0.10;
            const warp2 = Math.cos(nx * 2.0 - time * 0.8) * 0.10;

            const sx = nx + warp1;
            const sy = ny + warp2;

            const v = field(sx, sy, time);

            // normaliza o campo para 0..1
            const n = clamp((v + 2.0) / 4.0, 0, 1);

            // superfície contínua: algumas zonas mais fortes, outras mais leves
            const density = smoothstep(0.15, 0.9, n);

            // cor amarela -> azul -> roxa
            const [r, g, b] = getGradientColor(n);

            // pontos de fundo continuam sempre visíveis
            const baseAlpha = 0.18;
            const alpha = baseAlpha + density * 0.72;

            // tamanho dos pontos
            const localPulse = 0.5 + 0.5 * Math.sin(time * 3.1 + p.seed + n * 4.0);
            const radius =
                0.8 +
                density * 4.0 +
                localPulse * density * 1.2;

            // pequena deslocação coerente para parecer “superfície viva”
            const pushAmount = (density - 0.5) * 8.0 + (breath - 0.5) * 7.0;
            const angle = (n * Math.PI * 2.0) + p.seed * 0.18;

            const px = p.x + Math.cos(angle) * pushAmount * 0.45;
            const py = p.y + Math.sin(angle) * pushAmount * 0.45;

            ctx.beginPath();
            ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
            ctx.fill();
        }

        time += 0.028; // mais rápido a mudar
        requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
})();
</script>

{% endblock %}
