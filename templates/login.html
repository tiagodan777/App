<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f7f8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="{{ doc_root }}estilos/style.css">
    <link rel="stylesheet" href="{{ doc_root }}estilos/login.css">
</head>
<body>
    <main>
        <form action="{{ doc_root }}login" method="post">
            <p>
                <label for="utilizador">Nome de utilizador</label>
                <input type="text" name="utilizador" id="utilizador">
            </p>
            <p>
                <label for="palavra-passe">Palavra-Passe</label>
                <input type="password" name="palavra_passe" id="palavra-passe">
            </p>
            <p class="em-linha">
                <input type="checkbox" name="mostrar_palavra_passe" id="mostrar-palavra-passe">
                <label for="mostrar-palavra-passe">Mostrar palavra-passe</label> 
            </p>
            <p class="em-linha">
                <input type="checkbox" name="manter_sessao" id="manter-sessao">
                <label for="manter-sessao">Manter sessão iniciada</label>
            </p>
        </form>
    </main>
</body>
</html>
