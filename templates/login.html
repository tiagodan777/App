<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f7f8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="{{ doc_root }}estilos/style.css">
    <link rel="stylesheet" href="{{ doc_root }}estilos/login.css">
</head>
<body>
    <main>
        <form action="{{ doc_root }}login" method="post">
            <h1>Entrar</h1>
            <p>
                <label for="utilizador">Email ou Nº de telefone</label>
                <input type="text" name="utilizador" id="utilizador">
            </p>
            <p>
                <label for="palavra-passe">Palavra-Passe</label>
                <input type="password" name="palavra_passe" id="palavra-passe">
            </p>
            <p class="em-linha">
                <input type="checkbox" name="ver_password" id="ver-password">
                <label for="ver-password">Mostrar palavra-passe</label> 
            </p>
            <p class="em-linha">
                <input type="checkbox" name="manter_sessao" id="manter-sessao">
                <label for="manter-sessao">Manter sessão iniciada</label>
            </p>
            <input type="submit" value="Entrar">
        </form>
    </main>
    <aside>
        <a href="{{ doc_root }}password-lost" id="esqueci-palavra-passe">Esqueceste-te da password?</a>
        <a href="{{ doc_root }}create-account" id="registar">Ainda não te registas-te? <span>Cria um conta</span></a>
    </aside>
    <script src="{{ doc_root }}js/jquery-4.0.0.js"></script>
    <script src="{{ doc_root }}js/login.js"></script>
</body>
</html>
