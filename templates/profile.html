{% extends 'layout.html' %}

{% block content %}
    <header>
        <img src="{{ doc_root }}imagens/fotos-perfil/{{ membro.foto_perfil }}" alt="Foto de perfil de {{ membro.nome }}">
    </header>
    <section id="principal">
        <h1>{{ membro.nome }}</h1>
        <h2>{{ idade }}</h2>
        <p>{{ membro.objetivo }}</p>
        <p>{{ membro.bio }}</p>
    </section>
    <section id="adicional">
        <ul>
            {{ membro.gostos }}
        </ul>
    </section>
{% endblock %}
